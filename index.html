<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipkart-layout</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <header class="header">
        <div class="head-div-left">
            <img src="" alt="flipkart logo">
            <div class="input">
                <input type="search" name="search" id="" placeholder="Search for product brand and more">
            </div>
        </div>
        <div class="head-div-right">
            <button class="btn">Login</button>
            <button class="btn-same">More</button>
            <button class="btn-same">Cart</button>
        </div>
    </header>
    <main class="main">
        <section class="top-section">

        </section>
        <section class="main-section">
            <div class="main-sec-box">
                <div class="box main-sec-div-top">
                    <div class="inner-div"></div>
                    <hr>
                    <div class="outer-div"></div>
                </div>
                <div class="box main-sec-div-bottom">
                    <div class="inner-div2"></div>
                    <hr>
                    <div class="outer-div"></div>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
